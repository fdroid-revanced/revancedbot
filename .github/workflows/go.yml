name: Go

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3
      - name: Unit tests
        run: mise run test
      - name: Build
        run: mise run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3
      - name: End-to-end
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keep soft skips for APKPure/fdroid unless we pin fdroidserver here later
          REVANCEDBOT_E2E_STRICT: "0"
        run: mise run test:e2e
