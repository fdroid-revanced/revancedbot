name: Go

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -o /tmp/revancedbot ./cmd/revancedbot
