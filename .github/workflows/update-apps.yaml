name: Update apps

on:
  workflow_dispatch:
jobs:
  update-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3
      - uses: nanasess/setup-chromedriver@v2
      - name: Fetch and patch apks
        run: uv run --with . repatcher patch-all

      - name: Make a folder where I put the apks
        run: |
          mkdir -p /tmp/RESULT
          mv /tmp/revancedbot/patched_apks/*.apk /tmp/RESULT

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/RESULT
