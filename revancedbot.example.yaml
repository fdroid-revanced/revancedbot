# Place this file in the F-Droid simple-binary REPO root as revancedbot.yaml.
# It is the authority; the bot generates config.yml (gitignored) for fdroidserver.
#
# Usage:
#   revancedbot run /path/to/this/repo
#   revancedbot run /path/to/this/repo --cache /var/tmp/revancedbot-cache

repo_name: ReVanced F-Droid Repo
repo_url: https://example.invalid/fdroid/repo
repo_description: >
  ReVanced-patched applications (simple binary repository).

downloaders:
  - aptoide   # JSON API (PyAPKDownloader-style); often less rate-limited
  - apkpure
  - apkmirror

browser:
  # GHA Browserless service example:
  # cdp_url: ws://localhost:3000
  cdp_url: ""

# Optional pool overrides (omit for bot defaults: IO=4, CPU=NumCPU, Internet=2).
# Internet caps concurrent stock HTTP; raise only if stores tolerate it.
# pool_io: 8
# pool_cpu: 4
# pool_internet: 2

log_level: info
